<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Growth Tracker</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F8F9F5;
            color: #2D3748;
            margin: 0;
            overflow: hidden; 
        }

        .chart-font {
            font-family: 'Lora', serif;
        }

        .curve-path {
            transition: stroke-dashoffset 0.5s ease-out;
        }
        
        .curve-group:hover .curve-full {
            stroke-width: 6;
            opacity: 0.3;
        }
        
        .curve-group:hover .curve-progress {
            stroke-width: 6;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row text-slate-800">

    <!-- Main Canvas Area -->
    <main class="flex-1 relative h-full flex flex-col">
        <header class="absolute top-0 left-0 w-full p-6 z-10 pointer-events-none flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-semibold text-slate-800 chart-font tracking-tight">Global Growth Output</h1>
                <p class="text-slate-500 text-sm mt-1 chart-font italic">Indexed mastery progression across multiple disciplines</p>
            </div>
        </header>

        <div id="canvas-container" class="flex-1 w-full h-full cursor-crosshair overflow-x-auto overflow-y-hidden pt-24 pb-8 px-8">
            <!-- SVG will be injected here -->
        </div>
    </main>

    <!-- Sidebar Controls -->
    <aside class="w-full md:w-80 lg:w-96 bg-white border-l border-slate-200 h-full flex flex-col shadow-2xl z-20 relative">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
                    <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                </svg>
                <h2 class="text-xl font-semibold">Journeys</h2>
            </div>
            
            <!-- Robust Plus Button -->
            <button onclick="window.app.createNewEvent()" class="bg-[#2E7D32] hover:bg-[#1B5E20] text-white rounded-full w-10 h-10 flex items-center justify-center transition-all duration-300 shadow-lg transform hover:scale-105 hover:rotate-90 active:scale-95" title="Construct New Event">
                <svg class="pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14"/><path d="M12 5v14"/>
                </svg>
            </button>
        </div>

        <!-- Edit Form -->
        <div id="add-form" class="hidden p-6 bg-slate-50 border-b border-slate-200 text-sm shadow-inner relative">
            <button onclick="window.app.cancelEdit()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition-colors p-1" title="Close Panel">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
            <h3 id="form-title" class="font-medium text-slate-700 mb-4 text-base">Event Details</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Name</label>
                    <input type="text" id="j-name" placeholder="e.g., Spanish, Guitar" class="w-full px-3 py-2 rounded-md border border-slate-300 focus:outline-none focus:ring-1 focus:ring-[#2E7D32]">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Start Date</label>
                    <input type="date" id="j-start" class="w-full px-3 py-2 rounded-md border border-slate-300 focus:outline-none focus:ring-1 focus:ring-[#2E7D32]">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-slate-500 mb-1">Weeks</label>
                        <input type="number" id="j-weeks" value="12" min="1" class="w-full px-3 py-2 rounded-md border border-slate-300 focus:outline-none focus:ring-1 focus:ring-[#2E7D32]">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 mb-1">Sessions/Wk</label>
                        <input type="number" id="j-freq" value="3" min="1" max="7" class="w-full px-3 py-2 rounded-md border border-slate-300 focus:outline-none focus:ring-1 focus:ring-[#2E7D32]">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Color Theme</label>
                    <div class="flex items-center gap-2 mb-2" id="palette-swatches"></div>
                    <div class="flex items-center gap-2">
                        <input type="color" id="j-color" value="#2E7D32" class="h-8 w-12 cursor-pointer rounded border border-slate-300 p-0.5 bg-white">
                        <span class="text-xs text-slate-500">Custom color</span>
                    </div>
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="window.app.saveJourney()" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white py-2 rounded-md font-medium transition-colors shadow-sm">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>

        <!-- Journey List -->
        <div id="journey-list" class="flex-1 overflow-y-auto p-4 space-y-3">
            <!-- Injected via JS -->
        </div>
    </aside>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl p-6 w-full max-w-sm shadow-xl mx-4">
            <h3 class="text-lg font-semibold text-slate-800 mb-2">Remove Event?</h3>
            <p class="text-sm text-slate-500 mb-6">This will permanently remove the event and its progress from your timeline. This action cannot be undone.</p>
            <div class="flex gap-3 justify-end">
                <button onclick="window.app.closeDeleteModal()" class="px-4 py-2 rounded-md text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm">Cancel</button>
                <button onclick="window.app.confirmDelete()" class="px-4 py-2 rounded-md bg-red-600 hover:bg-red-700 text-white transition-colors font-medium text-sm shadow-sm">Delete</button>
            </div>
        </div>
    </div>

    <!-- Application Script with Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpt2i_0V5vLz9uEV0SpgxgVdImaf-gpHs",
            authDomain: "growth-map-53c28.firebaseapp.com",
            projectId: "growth-map-53c28",
            storageBucket: "growth-map-53c28.firebasestorage.app",
            messagingSenderId: "1062952874728",
            appId: "1:1062952874728:web:93bc8000ccaff1904a8f5d"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);

        const urlParams = new URLSearchParams(window.location.search);
        const appId = (urlParams.get('board') || 'default-shared-board')
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9-_]/g, '-')
            .slice(0, 80) || 'default-shared-board';
        let currentUser = null;
        let unsubscribeJourneys = null;

        window.app = {
            palette: [
                '#C62828', '#1565C0', '#F57C00', '#2E7D32', '#37474F', '#6A1B9A', '#00838F'
            ],

            state: {
                isFormOpen: false,
                editingId: null,
                pendingDeleteId: null,
                isLoading: true,
                journeys: []
            },

            async init() {
                const swatchesContainer = document.getElementById('palette-swatches');
                this.palette.forEach(color => {
                    const btn = document.createElement('button');
                    btn.className = "w-6 h-6 rounded-full border border-slate-200 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-slate-400 transition-all shadow-sm";
                    btn.style.backgroundColor = color;
                    btn.onclick = () => document.getElementById('j-color').value = color;
                    swatchesContainer.appendChild(btn);
                });

                this.render(); 

            const initAuth = async () => {
                await signInAnonymously(auth);
            };

                try {
                    await initAuth();
                } catch(e) {
                    console.error("Auth init issue:", e);
                }

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        this.setupFirestoreListener();
                    } else {
                        if (unsubscribeJourneys) unsubscribeJourneys();
                        this.state.journeys = [];
                        this.state.isLoading = false;
                        this.render();
                    }
                });

                window.addEventListener('resize', () => this.renderCanvas());
            },

            setupFirestoreListener() {
                if (!currentUser) return;
                
                const journeysRef = collection(db, 'sharedBoards', appId, 'journeys');
                
                unsubscribeJourneys = onSnapshot(journeysRef, (snapshot) => {
                    // Create a map to efficiently preserve any optimistic updates that haven't synced back yet
                    const updatedJourneys = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    // Only update the state and re-render if it's not currently being optimistically updated
                    // to prevent visual flickering when clicking "+" really fast.
                    this.state.journeys = updatedJourneys;
                    this.state.isLoading = false;
                    this.render();
                }, (error) => {
                    console.error("Firestore listener error:", error);
                    this.state.isLoading = false;
                    this.render();
                });
            },

            // Truly Instant: Never gets blocked by network or auth loading times
            async createNewEvent() {
                try {
                    const color = this.palette[(this.state.journeys || []).length % this.palette.length] || '#2E7D32';
                    const docId = Date.now().toString();
                    
                    const newEvent = {
                        name: `New Event`,
                        startDate: Date.now(),
                        weeks: 12,
                        totalSessions: 36,
                        currentSession: 0,
                        color: color,
                        createdAt: Date.now()
                    };

                    // Optimistic UI Update - ALWAYS executes immediately
                    if (!this.state.journeys) this.state.journeys = [];
                    this.state.journeys.push({ id: docId, ...newEvent });
                    
                    // Force loading off so the canvas and sidebar draw the new element immediately
                    this.state.isLoading = false;
                    this.render();
                    
                    // Immediately open the details editor
                    this.editJourney(docId);

                    // Wait gently in the background if auth is still connecting (max 2 seconds)
                    if (!currentUser) {
                        for(let i = 0; i < 20; i++) {
                            await new Promise(r => setTimeout(r, 100));
                            if(currentUser) break;
                        }
                    }

                    // Save to cloud seamlessly once connected
                    if (currentUser) {
                        const docRef = doc(db, 'sharedBoards', appId, 'journeys', docId);
                        await setDoc(docRef, newEvent);
                    } else {
                        console.warn("Could not save to cloud: Network or auth disconnected.");
                    }
                } catch(e) {
                    console.error("Error creating new event:", e);
                }
            },

            editJourney(id) {
                const journey = this.state.journeys.find(j => j.id === id);
                if (!journey) return;

                this.state.editingId = id;
                
                document.getElementById('j-name').value = journey.name;
                
                // Safely format date to prevent timezone shift issues in date picker
                const d = new Date(journey.startDate);
                document.getElementById('j-start').value = d.toISOString().split('T')[0];
                
                document.getElementById('j-weeks').value = journey.weeks;
                document.getElementById('j-freq').value = Math.round(journey.totalSessions / journey.weeks);
                document.getElementById('j-color').value = journey.color;

                this.state.isFormOpen = true;
                document.getElementById('add-form').classList.remove('hidden');
                
                // Re-render sidebar to apply the highlight border to the active event
                this.renderSidebar();
            },

            cancelEdit() {
                this.state.editingId = null;
                this.state.isFormOpen = false;
                document.getElementById('add-form').classList.add('hidden');
                this.renderSidebar(); // remove active highlight
            },

            async saveJourney() {
                if (!currentUser || !this.state.editingId) return;

                const name = document.getElementById('j-name').value || 'New Event';
                const startInput = document.getElementById('j-start').value;
                // Add T12:00:00 to prevent timezone drift when saving
                const startDate = startInput ? new Date(startInput + 'T12:00:00').getTime() : Date.now();
                const weeks = parseInt(document.getElementById('j-weeks').value) || 12;
                const frequency = parseInt(document.getElementById('j-freq').value) || 3;
                const color = document.getElementById('j-color').value || this.palette[0];
                const totalSessions = weeks * frequency;

                try {
                    const docRef = doc(db, 'sharedBoards', appId, 'journeys', this.state.editingId);
                    
                    const existing = this.state.journeys.find(j => j.id === this.state.editingId);
                    let safeCurrentSession = existing ? existing.currentSession : 0;
                    if (safeCurrentSession > totalSessions) safeCurrentSession = totalSessions;

                    await updateDoc(docRef, {
                        name, startDate, weeks, totalSessions, currentSession: safeCurrentSession, color
                    });
                } catch (error) {
                    console.error("Error saving to cloud:", error);
                }
                
                this.cancelEdit();
            },

            async logProgress(id) {
                if (!currentUser) return;

                const journey = this.state.journeys.find(j => j.id === id);
                if (journey && journey.currentSession < journey.totalSessions) {
                    try {
                        const docRef = doc(db, 'sharedBoards', appId, 'journeys', id);
                        await updateDoc(docRef, { currentSession: journey.currentSession + 1 });
                    } catch (error) {
                        console.error("Error updating progress:", error);
                    }
                }
            },

            deleteJourney(id) {
                this.state.pendingDeleteId = id;
                document.getElementById('delete-modal').classList.remove('hidden');
            },

            closeDeleteModal() {
                this.state.pendingDeleteId = null;
                document.getElementById('delete-modal').classList.add('hidden');
            },

            async confirmDelete() {
                if (!currentUser || !this.state.pendingDeleteId) return;

                try {
                    const docRef = doc(db, 'sharedBoards', appId, 'journeys', this.state.pendingDeleteId);
                    await deleteDoc(docRef);
                    if (this.state.editingId === this.state.pendingDeleteId) {
                        this.cancelEdit();
                    }
                } catch (error) {
                    console.error("Error deleting document:", error);
                }

                this.closeDeleteModal();
            },

            render() {
                this.renderCanvas();
                this.renderSidebar();
            },

            renderSidebar() {
                const container = document.getElementById('journey-list');
                
                if (this.state.isLoading) {
                    container.innerHTML = `<div class="text-center text-slate-400 mt-10 text-sm animate-pulse">Loading events...</div>`;
                    return;
                }

                if (this.state.journeys.length === 0) {
                    container.innerHTML = `<div class="text-center text-slate-400 mt-10 text-sm">No active events. Click the <span onclick="window.app.createNewEvent()" class="text-[#2E7D32] font-bold text-lg cursor-pointer hover:underline">+</span> button above to construct a curve!</div>`;
                    return;
                }

                const displayJourneys = [...this.state.journeys].sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

                container.innerHTML = displayJourneys.map(j => {
                    const percent = Math.round((j.currentSession / j.totalSessions) * 100);
                    const isDone = j.currentSession >= j.totalSessions;
                    const isActiveEdit = this.state.editingId === j.id;
                    
                    return `
                        <div class="bg-white border ${isActiveEdit ? 'border-[#2E7D32] shadow-md ring-1 ring-[#2E7D32]' : 'border-slate-100 shadow-sm hover:shadow-md'} rounded-xl p-4 transition-all relative overflow-hidden group">
                            <div class="absolute left-0 top-0 bottom-0 w-1.5" style="background-color: ${j.color}"></div>
                            
                            <div class="ml-2">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="font-medium text-slate-800">${j.name}</h4>
                                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onclick="window.app.editJourney('${j.id}')" class="text-slate-400 hover:text-blue-600 p-1" title="Edit Properties">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                        </button>
                                        <button onclick="window.app.deleteJourney('${j.id}')" class="text-slate-400 hover:text-red-500 p-1" title="Delete Event">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="text-xs text-slate-500 mb-3">
                                    Started ${new Date(j.startDate).toLocaleDateString()} • ${j.weeks}wks
                                </div>
                                
                                <div class="flex items-center gap-3">
                                    <button 
                                        onclick="window.app.logProgress('${j.id}')" 
                                        ${isDone ? 'disabled' : ''}
                                        class="flex-1 py-1.5 rounded text-sm font-medium transition-colors flex items-center justify-center gap-1
                                            ${isDone ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'text-white hover:opacity-90'}"
                                        style="background-color: ${isDone ? '' : j.color}">
                                        ${isDone ? 'Mastered' : '+ Log Session'}
                                    </button>
                                    <div class="text-xs font-semibold w-12 text-right" style="color: ${j.color}">
                                        ${percent}%
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            renderCanvas() {
                const container = document.getElementById('canvas-container');
                const rect = container.getBoundingClientRect();
                
                const minWidth = 800;
                const width = Math.max(rect.width, minWidth);
                const height = rect.height;

                const ml = 60, mr = 180, mt = 40, mb = 60; 
                const innerW = width - ml - mr;
                const innerH = height - mt - mb;

                if (this.state.isLoading) {
                    container.innerHTML = `<svg width="100%" height="100%"><text x="50%" y="50%" text-anchor="middle" fill="#94A3B8" class="chart-font animate-pulse">Loading timeline...</text></svg>`;
                    return;
                }

                if (this.state.journeys.length === 0) {
                    container.innerHTML = `<svg width="100%" height="100%"><text x="50%" y="50%" text-anchor="middle" fill="#94A3B8" class="chart-font">Timeline is empty. Click + to construct a curve.</text></svg>`;
                    return;
                }

                let globalMinTime = Infinity;
                let globalMaxTime = -Infinity;

                this.state.journeys.forEach(j => {
                    const durationMs = j.weeks * 7 * 24 * 60 * 60 * 1000;
                    const endTime = j.startDate + durationMs;
                    if (j.startDate < globalMinTime) globalMinTime = j.startDate;
                    if (endTime > globalMaxTime) globalMaxTime = endTime;
                });

                const timeSpan = globalMaxTime - globalMinTime;
                const paddedSpan = timeSpan === 0 ? (30 * 24 * 60 * 60 * 1000) : timeSpan; 
                const renderMinTime = globalMinTime - (paddedSpan * 0.05);
                const renderMaxTime = globalMaxTime + (paddedSpan * 0.05);

                const mapX = (time) => ml + ((time - renderMinTime) / (renderMaxTime - renderMinTime)) * innerW;
                const mapY = (val) => mt + innerH - (val * innerH);

                let svgContent = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="w-full h-full">`;

                const yTicks = [0, 500, 1000, 1500, 2000, 2500, 3000];
                yTicks.forEach(tick => {
                    const val = tick / 3000; 
                    const y = mapY(val);
                    svgContent += `<line x1="${ml}" y1="${y}" x2="${width - mr + 20}" y2="${y}" stroke="#E2E8F0" stroke-width="1.5"/>`;
                    svgContent += `<text x="${ml - 10}" y="${y + 4}" fill="#64748B" font-size="11" text-anchor="end" class="chart-font">${tick.toLocaleString()}</text>`;
                });

                svgContent += `<text x="-${height/2}" y="15" fill="#64748B" font-size="12" font-weight="600" text-anchor="middle" transform="rotate(-90)" class="chart-font">Mastery Index (0 = 0, 3000 = 100%)</text>`;
                svgContent += `<text x="${ml + 5}" y="${mapY(0) - 5}" fill="#64748B" font-size="11" class="chart-font italic">Baseline start</text>`;

                const spanDays = paddedSpan / (1000 * 60 * 60 * 24);
                let tickIntervalMonths = 1;
                if (spanDays > 1000) tickIntervalMonths = 12; 
                else if (spanDays > 300) tickIntervalMonths = 3; 

                let currentTick = new Date(renderMinTime);
                currentTick.setDate(1);
                
                while (currentTick.getTime() <= renderMaxTime) {
                    const x = mapX(currentTick.getTime());
                    if (x >= ml && x <= width - mr) {
                        const label = spanDays > 1000 ? currentTick.getFullYear() : currentTick.toLocaleDateString('default', { month: 'short', year: 'numeric' });
                        
                        svgContent += `<line x1="${x}" y1="${mapY(0)}" x2="${x}" y2="${mapY(0) + 5}" stroke="#94A3B8" stroke-width="1.5"/>`;
                        svgContent += `<text x="${x}" y="${mapY(0) + 20}" fill="#64748B" font-size="11" text-anchor="middle" class="chart-font">${label}</text>`;
                    }
                    currentTick.setMonth(currentTick.getMonth() + tickIntervalMonths);
                }

                svgContent += `<line x1="${ml}" y1="${mapY(0)}" x2="${width - mr + 20}" y2="${mapY(0)}" stroke="#94A3B8" stroke-width="1.5"/>`;

                const sortedJourneys = [...this.state.journeys].sort((a,b) => (a.currentSession/a.totalSessions) - (b.currentSession/b.totalSessions));

                sortedJourneys.forEach((j) => {
                    const durationMs = j.weeks * 7 * 24 * 60 * 60 * 1000;
                    
                    const pointsCount = 100;
                    const midpoint = j.totalSessions / 2;
                    const k = 10 / j.totalSessions; 

                    let pathDataFull = "";
                    let pathDataProgress = "";
                    let lastProgressX, lastProgressY;
                    let endX, endY;

                    for (let i = 0; i <= pointsCount; i++) {
                        const sessionEquivalent = (i / pointsCount) * j.totalSessions;
                        const timeEquivalent = j.startDate + (i / pointsCount) * durationMs;
                        
                        const yVal = 1 / (1 + Math.exp(-k * (sessionEquivalent - midpoint)));
                        
                        const px = mapX(timeEquivalent);
                        const py = mapY(yVal);
                        
                        if (i === pointsCount) {
                            endX = px; endY = py;
                        }

                        const cmd = i === 0 ? 'M' : 'L';
                        const pointStr = `${cmd} ${px} ${py} `;
                        
                        pathDataFull += pointStr;

                        if (sessionEquivalent <= j.currentSession) {
                            pathDataProgress += pointStr;
                            lastProgressX = px;
                            lastProgressY = py;
                        }
                    }

                    if (!lastProgressX) {
                        lastProgressX = mapX(j.startDate);
                        lastProgressY = mapY(1 / (1 + Math.exp(-k * (0 - midpoint))));
                        pathDataProgress = `M ${lastProgressX} ${lastProgressY}`;
                    }

                    svgContent += `<g class="curve-group cursor-pointer">`;
                    svgContent += `<path d="${pathDataFull}" fill="none" stroke="${j.color}" stroke-width="2" stroke-dasharray="4,4" opacity="0.4" class="curve-full transition-all duration-300"/>`;
                    svgContent += `<path d="${pathDataProgress}" fill="none" stroke="${j.color}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="curve-progress transition-all duration-300"/>`;
                    svgContent += `<circle cx="${lastProgressX}" cy="${lastProgressY}" r="4" fill="${j.color}" stroke="#fff" stroke-width="1.5" />`;

                    const percentStr = Math.round((j.currentSession / j.totalSessions) * 3000);
                    svgContent += `
                        <text x="${endX + 8}" y="${endY + 4}" fill="${j.color}" font-size="13" font-weight="600" class="chart-font">
                            ${j.name} (${percentStr})
                        </text>
                    `;

                    svgContent += `</g>`;
                });

                svgContent += `</svg>`;
                container.innerHTML = svgContent;
            }
        };

        window.app.init();
    </script>
</body>
