<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Growth Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;600&display=swap');
        
        body {
            /* Using Outfit for UI, Lora (serif) for the chart to match the academic/data-viz feel of the uploaded image */
            font-family: 'Outfit', sans-serif;
            background-color: #F8F9F5; /* Very light greenish-gray background from the chart */
            color: #2D3748;
            margin: 0;
            overflow: hidden; /* Prevent body scroll, handle inside */
        }

        .chart-font {
            font-family: 'Lora', serif;
        }

        /* Chart Animations */
        .curve-path {
            transition: stroke-dashoffset 0.5s ease-out;
        }
        
        .curve-group:hover .curve-full {
            stroke-width: 6;
            opacity: 0.3;
        }
        
        .curve-group:hover .curve-progress {
            stroke-width: 6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row text-slate-800">

    <!-- Main Canvas Area -->
    <main class="flex-1 relative h-full flex flex-col">
        <!-- Header overlay -->
        <header class="absolute top-0 left-0 w-full p-6 z-10 pointer-events-none flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-semibold text-slate-800 chart-font tracking-tight">Global Growth Output</h1>
                <p class="text-slate-500 text-sm mt-1 chart-font italic">Indexed mastery progression across multiple disciplines</p>
            </div>
        </header>

        <!-- The SVG Canvas -->
        <div id="canvas-container" class="flex-1 w-full h-full cursor-crosshair overflow-x-auto overflow-y-hidden pt-24 pb-8 px-8">
            <!-- SVG will be injected here -->
        </div>
    </main>

    <!-- Sidebar Controls -->
    <aside class="w-full md:w-80 lg:w-96 bg-white border-l border-slate-200 h-full flex flex-col shadow-2xl z-20">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
                    <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                </svg>
                <h2 class="text-xl font-semibold">Journeys</h2>
            </div>
            <button onclick="app.toggleForm()" class="bg-slate-800 hover:bg-slate-700 text-white rounded-full w-8 h-8 flex items-center justify-center transition-colors shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
        </div>

        <!-- Add Form (Hidden by default) -->
        <div id="add-form" class="hidden p-6 bg-slate-50 border-b border-slate-200 text-sm">
            <h3 class="font-medium text-slate-700 mb-4">Plant a New Seed</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Name</label>
                    <input type="text" id="j-name" placeholder="e.g., Spanish, Guitar" class="w-full px-3 py-2 rounded-md border border-slate-300 focus:outline-none focus:ring-1 focus:ring-slate-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Start Date</label>
                    <input type="date" id="j-start" class="w-full px-3 py-2 rounded-md border border-slate-300 focus:outline-none focus:ring-1 focus:ring-slate-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-slate-500 mb-1">Weeks</label>
                        <input type="number" id="j-weeks" value="12" min="1" class="w-full px-3 py-2 rounded-md border border-slate-300 focus:outline-none focus:ring-1 focus:ring-slate-500">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 mb-1">Sessions/Wk</label>
                        <input type="number" id="j-freq" value="3" min="1" max="7" class="w-full px-3 py-2 rounded-md border border-slate-300 focus:outline-none focus:ring-1 focus:ring-slate-500">
                    </div>
                </div>
                <button onclick="app.createJourney()" class="w-full mt-2 bg-[#2E7D32] hover:bg-[#1B5E20] text-white py-2 rounded-md font-medium transition-colors">
                    Add to Timeline
                </button>
            </div>
        </div>

        <!-- Journey List -->
        <div id="journey-list" class="flex-1 overflow-y-auto p-4 space-y-3">
            <!-- Injected via JS -->
        </div>
    </aside>

    <script>
        const app = {
            // Colors extracted from the uploaded visualization PDF
            palette: [
                '#C62828', // Red (Oil palm)
                '#1565C0', // Blue (Soybeans)
                '#F57C00', // Orange (Maize)
                '#2E7D32', // Green (Rice)
                '#37474F', // Dark Gray/Green (Wheat)
                '#6A1B9A', // Purple (Extra)
                '#00838F'  // Teal (Extra)
            ],

            state: {
                isFormOpen: false,
                journeys: []
            },

            init() {
                // Set default date in form to today
                document.getElementById('j-start').valueAsDate = new Date();

                // Add some initial dummy data so the canvas isn't empty on first load
                const today = new Date();
                const twoMonthsAgo = new Date(); twoMonthsAgo.setMonth(today.getMonth() - 2);
                const oneMonthAgo = new Date(); oneMonthAgo.setMonth(today.getMonth() - 1);
                const twoWeeksAgo = new Date(); twoWeeksAgo.setDate(today.getDate() - 14);

                this.state.journeys = [
                    {
                        id: 1,
                        name: "Machine Learning",
                        startDate: twoMonthsAgo.getTime(),
                        weeks: 24,
                        totalSessions: 24 * 3,
                        currentSession: 35,
                        color: this.palette[0] // Red
                    },
                    {
                        id: 2,
                        name: "Spanish",
                        startDate: oneMonthAgo.getTime(),
                        weeks: 16,
                        totalSessions: 16 * 5,
                        currentSession: 25,
                        color: this.palette[1] // Blue
                    },
                    {
                        id: 3,
                        name: "Meditation",
                        startDate: twoWeeksAgo.getTime(),
                        weeks: 52,
                        totalSessions: 52 * 7,
                        currentSession: 14,
                        color: this.palette[3] // Green
                    }
                ];

                this.render();
                
                // Re-render on resize to keep SVG perfectly fitted
                window.addEventListener('resize', () => this.renderCanvas());
            },

            toggleForm() {
                this.state.isFormOpen = !this.state.isFormOpen;
                document.getElementById('add-form').classList.toggle('hidden', !this.state.isFormOpen);
            },

            createJourney() {
                const name = document.getElementById('j-name').value || 'New Journey';
                const startInput = document.getElementById('j-start').value;
                const startDate = startInput ? new Date(startInput).getTime() : Date.now();
                const weeks = parseInt(document.getElementById('j-weeks').value) || 12;
                const frequency = parseInt(document.getElementById('j-freq').value) || 3;
                
                const newJourney = {
                    id: Date.now(),
                    name,
                    startDate,
                    weeks,
                    totalSessions: weeks * frequency,
                    currentSession: 0,
                    color: this.palette[this.state.journeys.length % this.palette.length]
                };

                this.state.journeys.push(newJourney);
                
                // Reset form
                document.getElementById('j-name').value = '';
                this.toggleForm();
                this.render();
            },

            logProgress(id) {
                const journey = this.state.journeys.find(j => j.id === id);
                if (journey && journey.currentSession < journey.totalSessions) {
                    journey.currentSession++;
                    this.render();
                }
            },

            deleteJourney(id) {
                if(confirm("Are you sure you want to remove this journey?")) {
                    this.state.journeys = this.state.journeys.filter(j => j.id !== id);
                    this.render();
                }
            },

            render() {
                this.renderCanvas();
                this.renderSidebar();
            },

            renderSidebar() {
                const container = document.getElementById('journey-list');
                
                if (this.state.journeys.length === 0) {
                    container.innerHTML = `<div class="text-center text-slate-400 mt-10 text-sm">No active journeys. Plant a seed above!</div>`;
                    return;
                }

                container.innerHTML = this.state.journeys.map(j => {
                    const percent = Math.round((j.currentSession / j.totalSessions) * 100);
                    const isDone = j.currentSession >= j.totalSessions;
                    
                    return `
                        <div class="bg-white border border-slate-100 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">
                            <!-- Color accent bar -->
                            <div class="absolute left-0 top-0 bottom-0 w-1.5" style="background-color: ${j.color}"></div>
                            
                            <div class="ml-2">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="font-medium text-slate-800">${j.name}</h4>
                                    <button onclick="app.deleteJourney(${j.id})" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                    </button>
                                </div>
                                <div class="text-xs text-slate-500 mb-3">
                                    Started ${new Date(j.startDate).toLocaleDateString()} • ${j.weeks}wks
                                </div>
                                
                                <div class="flex items-center gap-3">
                                    <button 
                                        onclick="app.logProgress(${j.id})" 
                                        ${isDone ? 'disabled' : ''}
                                        class="flex-1 py-1.5 rounded text-sm font-medium transition-colors flex items-center justify-center gap-1
                                            ${isDone ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'text-white hover:opacity-90'}"
                                        style="background-color: ${isDone ? '' : j.color}">
                                        ${isDone ? 'Mastered' : '+ Log Session'}
                                    </button>
                                    <div class="text-xs font-semibold w-12 text-right" style="color: ${j.color}">
                                        ${percent}%
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            renderCanvas() {
                const container = document.getElementById('canvas-container');
                const rect = container.getBoundingClientRect();
                
                // Set a minimum width for the SVG to allow horizontal scrolling if it gets too cramped
                const minWidth = 800;
                const width = Math.max(rect.width, minWidth);
                const height = rect.height;

                // Margins for axes
                const ml = 60, mr = 180, mt = 40, mb = 60; 
                const innerW = width - ml - mr;
                const innerH = height - mt - mb;

                if (this.state.journeys.length === 0) {
                    container.innerHTML = `<svg width="100%" height="100%"><text x="50%" y="50%" text-anchor="middle" fill="#94A3B8" class="chart-font">Add a journey to begin tracking the timeline.</text></svg>`;
                    return;
                }

                // 1. Calculate global timeline bounds
                let globalMinTime = Infinity;
                let globalMaxTime = -Infinity;

                this.state.journeys.forEach(j => {
                    const durationMs = j.weeks * 7 * 24 * 60 * 60 * 1000;
                    const endTime = j.startDate + durationMs;
                    if (j.startDate < globalMinTime) globalMinTime = j.startDate;
                    if (endTime > globalMaxTime) globalMaxTime = endTime;
                });

                // Add padding to timeline (5% before, 10% after for labels)
                const timeSpan = globalMaxTime - globalMinTime;
                // If only 1 day span, default it to a month to prevent division by zero
                const paddedSpan = timeSpan === 0 ? (30 * 24 * 60 * 60 * 1000) : timeSpan; 
                const renderMinTime = globalMinTime - (paddedSpan * 0.05);
                const renderMaxTime = globalMaxTime + (paddedSpan * 0.05);

                // Helper to map timestamp to X coordinate
                const mapX = (time) => ml + ((time - renderMinTime) / (renderMaxTime - renderMinTime)) * innerW;
                // Helper to map 0-1 progress to Y coordinate
                const mapY = (val) => mt + innerH - (val * innerH);

                let svgContent = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="w-full h-full">`;

                // --- Draw Y-Axis & Grid Lines (0, 500, 1000, 1500, etc - imitating the chart style) ---
                // We'll translate our 0-100% to 0-3000 index scale purely for the visual aesthetic of the PDF
                const yTicks = [0, 500, 1000, 1500, 2000, 2500, 3000];
                yTicks.forEach(tick => {
                    const val = tick / 3000; // normalized 0-1
                    const y = mapY(val);
                    // Light green/gray grid line
                    svgContent += `<line x1="${ml}" y1="${y}" x2="${width - mr + 20}" y2="${y}" stroke="#E2E8F0" stroke-width="1.5"/>`;
                    // Label
                    svgContent += `<text x="${ml - 10}" y="${y + 4}" fill="#64748B" font-size="11" text-anchor="end" class="chart-font">${tick.toLocaleString()}</text>`;
                });

                // Y-Axis title
                svgContent += `<text x="-${height/2}" y="15" fill="#64748B" font-size="12" font-weight="600" text-anchor="middle" transform="rotate(-90)" class="chart-font">Mastery Index (0 = 0, 3000 = 100%)</text>`;
                // "1961 baseline" equivalent
                svgContent += `<text x="${ml + 5}" y="${mapY(0) - 5}" fill="#64748B" font-size="11" class="chart-font italic">Baseline start</text>`;

                // --- Draw X-Axis (Years/Months) ---
                // Determine sensible ticks based on timeSpan
                const spanDays = paddedSpan / (1000 * 60 * 60 * 24);
                let tickIntervalMonths = 1;
                if (spanDays > 1000) tickIntervalMonths = 12; // Yearly if > 3 years
                else if (spanDays > 300) tickIntervalMonths = 3; // Quarterly if > 10 months

                let currentTick = new Date(renderMinTime);
                currentTick.setDate(1); // Start of month
                
                while (currentTick.getTime() <= renderMaxTime) {
                    const x = mapX(currentTick.getTime());
                    if (x >= ml && x <= width - mr) {
                        const label = spanDays > 1000 ? currentTick.getFullYear() : currentTick.toLocaleDateString('default', { month: 'short', year: 'numeric' });
                        
                        // Tick mark
                        svgContent += `<line x1="${x}" y1="${mapY(0)}" x2="${x}" y2="${mapY(0) + 5}" stroke="#94A3B8" stroke-width="1.5"/>`;
                        // Label
                        svgContent += `<text x="${x}" y="${mapY(0) + 20}" fill="#64748B" font-size="11" text-anchor="middle" class="chart-font">${label}</text>`;
                    }
                    currentTick.setMonth(currentTick.getMonth() + tickIntervalMonths);
                }

                // Solid axis line
                svgContent += `<line x1="${ml}" y1="${mapY(0)}" x2="${width - mr + 20}" y2="${mapY(0)}" stroke="#94A3B8" stroke-width="1.5"/>`;


                // --- Draw Journeys ---
                // Sort by current percent so higher values are drawn last (on top)
                const sortedJourneys = [...this.state.journeys].sort((a,b) => (a.currentSession/a.totalSessions) - (b.currentSession/b.totalSessions));

                sortedJourneys.forEach((j) => {
                    const durationMs = j.weeks * 7 * 24 * 60 * 60 * 1000;
                    
                    // Generate points for the S-Curve
                    const pointsCount = 100;
                    const midpoint = j.totalSessions / 2;
                    const k = 10 / j.totalSessions; // Steepness

                    let pathDataFull = "";
                    let pathDataProgress = "";
                    let lastProgressX, lastProgressY;
                    let endX, endY;

                    for (let i = 0; i <= pointsCount; i++) {
                        // Math logic
                        const sessionEquivalent = (i / pointsCount) * j.totalSessions;
                        const timeEquivalent = j.startDate + (i / pointsCount) * durationMs;
                        
                        // Sigmoid function
                        const yVal = 1 / (1 + Math.exp(-k * (sessionEquivalent - midpoint)));
                        
                        const px = mapX(timeEquivalent);
                        const py = mapY(yVal);
                        
                        if (i === pointsCount) {
                            endX = px; endY = py;
                        }

                        const cmd = i === 0 ? 'M' : 'L';
                        const pointStr = `${cmd} ${px} ${py} `;
                        
                        pathDataFull += pointStr;

                        // Only build the solid path up to the current progress
                        if (sessionEquivalent <= j.currentSession) {
                            pathDataProgress += pointStr;
                            lastProgressX = px;
                            lastProgressY = py;
                        }
                    }

                    // For instances where progress is exactly 0
                    if (!lastProgressX) {
                        lastProgressX = mapX(j.startDate);
                        lastProgressY = mapY(1 / (1 + Math.exp(-k * (0 - midpoint))));
                        pathDataProgress = `M ${lastProgressX} ${lastProgressY}`;
                    }

                    // Group for hover effects
                    svgContent += `<g class="curve-group cursor-pointer">`;

                    // Full projected path (faded/dashed)
                    svgContent += `<path d="${pathDataFull}" fill="none" stroke="${j.color}" stroke-width="2" stroke-dasharray="4,4" opacity="0.4" class="curve-full transition-all duration-300"/>`;

                    // Completed progress path (solid, thick)
                    svgContent += `<path d="${pathDataProgress}" fill="none" stroke="${j.color}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="curve-progress transition-all duration-300"/>`;

                    // Current node dot
                    svgContent += `<circle cx="${lastProgressX}" cy="${lastProgressY}" r="4" fill="${j.color}" stroke="#fff" stroke-width="1.5" />`;

                    // Label at the end of the line (matching the PDF aesthetic)
                    const percentStr = Math.round((j.currentSession / j.totalSessions) * 3000); // Translated to the 3000 scale
                    svgContent += `
                        <text x="${endX + 8}" y="${endY + 4}" fill="${j.color}" font-size="13" font-weight="600" class="chart-font">
                            ${j.name} (${percentStr})
                        </text>
                    `;

                    svgContent += `</g>`;
                });

                svgContent += `</svg>`;
                container.innerHTML = svgContent;
            }
        };

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
